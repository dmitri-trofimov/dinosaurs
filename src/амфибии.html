<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Динозавры-амфибии для печати</title>
    <style>
      @page {
        size: A4 landscape;
        margin: 0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 6mm;
        width: 297mm;
        height: 210mm;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background-image: linear-gradient(rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.25)), url("images/фон.амфибии.png");
        background-size: cover;
        background-position: top left;
        background-repeat: no-repeat;
        background-size: 297mm 210mm;
      }

      .row {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6mm;
        align-items: start;
        margin-top: 5mm;
      }

      figure {
        margin: 0;
        text-align: center;
        background-color: rgba(255, 255, 255, 0.65);
        padding: 5.3mm;
        border-radius: 5.3mm;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
        clip-path: inset(2.5mm 0);
        margin: -2.5mm 0;
      }

      figcaption {
        margin-top: 1mm;
        font-size: 8mm;
        line-height: 1.2;
        word-break: break-word;
        color: rgb(0, 80, 90);
      }

      h1 {
        text-align: center;
        font-size: 16.9mm;
        margin: 10mm auto 12mm auto;
        background-color: rgba(255, 255, 255, 0.65);
        display: table;
        padding: 2.6mm 10.6mm;
        border-radius: 5.3mm;
        color: rgb(0, 80, 90);
        text-shadow: 0 0 1.6mm rgba(0, 80, 90, 0.4);
      }
    </style>
  </head>
  <body>
    <h1>АМФИБИИ</h1>
    <main class="row" style="margin-top: 0">
      <figure>
        <img src="images/саркозух.png" alt="саркозух" />
        <figcaption>саркозух</figcaption>
      </figure>
      <figure>
        <img src="images/лимносцелис.png" alt="лимносцелис" />
        <figcaption>лимносцелис</figcaption>
      </figure>
      <figure>
        <img src="images/протостега.png" alt="протостега" />
        <figcaption>протостега</figcaption>
      </figure>
      <figure>
        <img src="images/ихитостега.png" alt="ихитостега" />
        <figcaption>ихитостега</figcaption>
      </figure>
    </main>
    <main class="row">
      <figure>
        <img src="images/нундазух.png" alt="нундазух" />
        <figcaption>нундазух</figcaption>
      </figure>
      <figure>
        <img src="images/стегозавр.png" alt="стегозавр" />
        <figcaption>стегозавр</figcaption>
      </figure>
      <figure>
        <img src="images/ankylosaurus.png" alt="анкилозавр" />
        <figcaption>анкилозавр</figcaption>
      </figure>
      <figure>
        <img src="images/diplodocus.png" alt="диплодок" />
        <figcaption>диплодок</figcaption>
      </figure>
    </main>
  </body>
</html>
