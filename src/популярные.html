<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Динозавры для печати</title>
    <style>
      @page {
        size: A4 portrait;
        margin: 6mm;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .row {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6mm;
        align-items: start;
        margin-top: 5mm;
      }

      figure {
        margin: 0;
        text-align: center;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
      }

      figcaption {
        margin-top: 1mm;
        font-size: 15pt;
        line-height: 1.2;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="row" style="margin-top: 0">
      <figure>
        <img src="images/тираннозавр.png" alt="тираннозавр" />
        <figcaption>тираннозавр</figcaption>
      </figure>
      <figure>
        <img src="images/triceratops.png" alt="трицератопс" />
        <figcaption>трицератопс</figcaption>
      </figure>
      <figure>
        <img src="images/stegosaurus.png" alt="стегозавр" />
        <figcaption>стегозавр</figcaption>
      </figure>
      <figure>
        <img src="images/diplodocus.png" alt="диплодок" />
        <figcaption>диплодок</figcaption>
      </figure>
    </main>
    <main class="row">
      <figure>
        <img src="images/велоцираптор.png" alt="велоцираптор" />
        <figcaption>велоцираптор</figcaption>
      </figure>
      <figure>
        <img src="images/спинозавр.png" alt="спинозавр" />
        <figcaption>спинозавр</figcaption>
      </figure>
      <figure>
        <img src="images/ankylosaurus.png" alt="анкилозавр" />
        <figcaption>анкилозавр</figcaption>
      </figure>
      <figure>
        <img src="images/parasaurolophus.png" alt="паразавролоф" />
        <figcaption>паразавролоф</figcaption>
      </figure>
    </main>
    <main class="row">
      <figure>
        <img src="images/птеродактиль.png" alt="птеродактиль" />
        <figcaption>птеродактиль</figcaption>
      </figure>
      <figure>
        <img src="images/мозазавр.png" alt="мозазавр" />
        <figcaption>мозазавр</figcaption>
      </figure>
      <figure>
        <img src="images/плезиозавр.png" alt="плезиозавр" />
        <figcaption>плезиозавр</figcaption>
      </figure>
      <figure>
        <img src="images/ихтиозавр.png" alt="ихтиозавр" />
        <figcaption>ихтиозавр</figcaption>
      </figure>
    </main>
    <main class="row">
      <figure>
        <img src="images/дилофозавр.png" alt="дилофозавр" />
        <figcaption>дилофозавр</figcaption>
      </figure>
      <figure>
        <img src="images/пахицефалозавр.png" alt="пахицефалозавр" />
        <figcaption>пахицефалозавр</figcaption>
      </figure>
      <figure>
        <img src="images/теризинозавр.png" alt="теризинозавр" />
        <figcaption>теризинозавр</figcaption>
      </figure>
      <figure>
        <img src="images/карнотавр.png" alt="карнотавр" />
        <figcaption>карнотавр</figcaption>
      </figure>
    </main>
    <main class="row">
      <figure>
        <img src="images/галлимим.png" alt="галлимим" />
        <figcaption>галлимим</figcaption>
      </figure>
      <figure>
        <img src="images/овираптор.png" alt="овираптор" />
        <figcaption>овираптор</figcaption>
      </figure>
      <figure>
        <img src="images/кетцалькоатль.png" alt="кетцалькоатль" />
        <figcaption>кетцалькоатль</figcaption>
      </figure>
      <figure>
        <img src="images/микрораптор.png" alt="микрораптор" />
        <figcaption>микрораптор</figcaption>
      </figure>
    </main>
  </body>
</html>
