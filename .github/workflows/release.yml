name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string
      name:
        description: 'Release name'
        required: false
        type: string

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    
    # Only allow the repository owner to trigger this workflow
    if: github.actor == github.repository_owner
    
    permissions:
      contents: write # Required for creating a release
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install NPM dependencies
        run: npm ci

      - name: Install system dependencies
        run: npm run install-system-dependencies

      - name: Build
        run: npm run build

      - name: Build Preview Images
        run: npm run build:previews

      - name: Commit Preview Images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/previews/
          git diff --cached --quiet || git commit -m "chore: update page preview images [skip ci]"
          git push

      - name: Package Release Assets
        run: |
          cd build
          zip -r ../dinosaurs.zip ./*

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ inputs.tag }} \
            --title "${{ inputs.name || inputs.tag }}" \
            --generate-notes \
            dinosaurs.zip
